      - "--txPower=46"
      - "--fakeTxPower=61"
      - "--bandwidth=25"
      - "--isd=500"
      - "--shadowingStd=8.0"
      - "--shadowingSeed=42"
      - "--maxReportCells=0"
      - "--outputDir=/output/fbs-close2-step4"

  sim-fbs-close2-step5:
