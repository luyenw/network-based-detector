# =============================================================================
# docker-compose.yml
# Physics-Constrained Fake Base Station Detection — ns-3 Simulation Pipeline
#
# Multiple independent services sharing the same parameters but testing
# different FBS positions relative to the impersonated legal cell (ECI=1
# at position (0, 0) in a 5×5 grid with ISD=500 m).
#
# All services write to subdirectories of ./results/:
#   results/fbs-zero/        FBS at (0, 0)             — dist =    0 m (colocated with LBS)
#   results/fbs-close/       FBS at (70.7, 70.7)       — dist =  100 m
#   results/fbs-close2/      FBS at (141.4, 141.4)     — dist =  200 m
#   results/fbs-medium/      FBS at (353.5, 353.5)     — dist ≈  500 m
#   results/fbs-far/         FBS at (707.1, 707.1)     — dist ≈ 1000 m
#   results/fbs-veryfar/     FBS at (1400, 1000)       — dist ≈ 1721 m
#   results/fbs-edge/        FBS at (1900, 1800)       — dist ≈ 2614 m (near grid edge)
#
# Usage:
#   docker compose up                         # all containers in parallel
#   docker compose up sim-fbs-far             # single container
#   docker compose up sim-fbs-close sim-fbs-medium   # two containers
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Base service template — shared by all simulation containers
# ---------------------------------------------------------------------------
x-sim-base: &sim-base
  image: ns3-fakebs:latest
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - NS_LOG=FakeBsSimulation=info
  restart: "no"
  volumes:
    - ./run.sh:/run.sh:ro
    - ./scratch/fake-bs-sim.cc:/src/fake-bs-sim.cc:ro
    - ./scratch/ccpcv-detector.h:/src/ccpcv-detector.h:ro
    - ./scratch/ccpcv-detector.cc:/src/ccpcv-detector.cc:ro
    - ./scratch/sim-logger.h:/src/sim-logger.h:ro
    - ./detector:/detector:ro
    # Single parent mount — each service writes to its own subdirectory
    # via --outputDir=/output/<name>
    - ./results:/output
  entrypoint: [ "/bin/bash", "/run.sh" ]

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ---- Build image only (no simulation) ------------------------------------
  build-image:
    <<: *sim-base
    entrypoint: [ "echo", "Image built successfully" ]

  # ── FBS colocated with LBS: (0, 0)  dist = 0 m ────────────────────────────
  # Baseline/degenerate case: FBS at exact same position as impersonated cell.
  # Geometrically indistinguishable — expected lowest detection score.
