    command:
      - "--gridSize=5"
      - "--numUe=200"
      - "--simTime=60"
      - "--detectorInterval=1.0"
      - "--fakeEci=1"
      - "--fbsDistFromLbs=200"
      - "--fbsAngleDeg=45"
