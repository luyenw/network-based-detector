  #   <<: *sim-base
  #   command:
  #     - "--gridSize=5"
  #     - "--numUe=200"
  #     - "--simTime=60"
  #     - "--detectorInterval=1.0"
  #     - "--fakeEci=1"
  #     - "--fakePosX=0"
  #     - "--fakePosY=0"
  #     - "--txPower=40"
  #     - "--bandwidth=25"
  #     - "--isd=500"
  #     - "--shadowingStd=8.0"
  #     - "--shadowingSeed=42"
  #     - "--maxReportCells=0"
  #     - "--outputDir=/output/fbs-zero"
  # sim-fbs-close2:
  #   <<: *sim-base
  #   command:
  #     - "--gridSize=5"
  #     - "--numUe=200"
  #     - "--simTime=60"
  #     - "--detectorInterval=1.0"
  #     - "--fakeEci=1"
  #     - "--fakePosX=141.4"
  #     - "--fakePosY=141.4"
  #     - "--txPower=46"
  #     - "--bandwidth=25"
  #     - "--isd=500"
  #     - "--shadowingStd=8.0"
  #     - "--shadowingSeed=42"
  #     - "--maxReportCells=0"
  #     - "--outputDir=/output/fbs-close2"

  # ── FBS cách LBS 200 m, chạy 5 step tăng công suất giả +5 dBm mỗi step ────
  # LBS giữ cố định 46 dBm ở toàn bộ các step.
  # Step powers (FBS): 46, 51, 56, 61, 66 dBm
  sim-fbs-close2-step1:
    <<: *sim-base
    command:
      - "--gridSize=5"
      - "--numUe=200"
      - "--simTime=60"
      - "--detectorInterval=1.0"
      - "--fakeEci=1"
      - "--fbsDistFromLbs=200"
      - "--fbsAngleDeg=45"
      - "--txPower=46"
      - "--fakeTxPower=46"
      - "--bandwidth=25"
      - "--isd=500"
      - "--shadowingStd=8.0"
      - "--shadowingSeed=42"
      - "--maxReportCells=0"
      - "--outputDir=/output/fbs-close2-step1"

  sim-fbs-close2-step2:
